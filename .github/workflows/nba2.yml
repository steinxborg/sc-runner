name: nba2
on:
  schedule:
    - cron: "*/20 * * * *" 
    
  workflow_dispatch:

jobs:
  fetch_data:
    runs-on: ubuntu-latest
    env:
      REPO_FOLDER: nba2-repo          # Local folder name for the cloned repo
      SCRIPT_NAME: nba2.py            # Script to run
      OUTPUT_FILE: nba2.json          # Output file generated by the script
    steps:
      # Checkout public repo (workflow runs here)
      - uses: actions/checkout@v5

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install dependencies
      - name: Install dependencies
        run: pip install pyplayready httpx m3u8 redis beautifulsoup4 curl_cffi

      # Clone the private repo
      - name: Clone repo
        run: |
          git clone https://${{ secrets.SCRAPER_TOKEN }}@github.com/${{ secrets.NBA_REPO }} $REPO_FOLDER

      # Run the Python script
      - name: Run Python script
        run: |
          cd $REPO_FOLDER
          python $SCRIPT_NAME

      # Commit and push output
      - name: Commit and push output
        run: |
          cd $REPO_FOLDER
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          
          git add $OUTPUT_FILE
          
          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "Update $OUTPUT_FILE"
          
          # Push changes
          git push
