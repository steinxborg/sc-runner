name: nba2
on:
  # schedule:
  #   - cron: "*/30 * * * *" 
  workflow_dispatch:

# Option 2: Shared concurrency group across all workflows
# All actions updating the same repo will queue and wait their turn
concurrency:
  group: nba-repo-update
  cancel-in-progress: false  # Wait for others to finish, don't cancel
  
jobs:
  fetch_data:
    runs-on: ubuntu-latest
    env:
      REPO_FOLDER: nba2-repo          # Local folder name for the cloned repo
      SCRIPT_NAME: app.py            # Script to run
      OUTPUT_FILE: nba2.json          # Output file generated by the script
    steps:
      # Checkout public repo (workflow runs here)
      - uses: actions/checkout@v5
      
      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      # Install dependencies
      - name: Install dependencies
        run: pip install pyplayready httpx m3u8 redis beautifulsoup4 curl_cffi
      
      # Clone the private repo
      - name: Clone repo
        run: |
          git clone https://${{ secrets.SCRAPER_TOKEN }}@github.com/${{ secrets.NBA_REPO }} $REPO_FOLDER
      
      # Run the Python script
      - name: Run Python script
        run: |
          cd $REPO_FOLDER
          python $SCRIPT_NAME
      
      # Commit and push output with retry logic
      - name: Commit and Push
        run: |
          cd $REPO_FOLDER
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          
          # Detect default branch
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          
          # Fetch latest and reset to ensure clean state
          git fetch origin $DEFAULT_BRANCH
          git reset --hard origin/$DEFAULT_BRANCH
          
          # Re-run script to get fresh data on latest state
          python $SCRIPT_NAME
          
          # Stage changes
          git add $OUTPUT_FILE
          
          # Exit if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit with timestamp
          git commit -m "Update $OUTPUT_FILE [${SCRIPT_NAME}-$(date -u +%Y%m%d-%H%M%S)]"
          
          # Push (should rarely fail due to concurrency control)
          if git push origin HEAD:$DEFAULT_BRANCH; then
            echo "✓ Successfully pushed changes"
            exit 0
          else
            echo "✗ Push failed - this should be rare with concurrency control"
            exit 1
          fi
