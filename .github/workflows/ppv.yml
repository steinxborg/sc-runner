name: ppv

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch_data:
    runs-on: ubuntu-latest

    env:
      REPO_FOLDER: ppv-repo
      SCRIPT_NAME: ppv.py
      OUTPUT_FILE: ppv.json

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install httpx pycryptodome ua_generator

      - name: Clone target repo
        run: |
          git clone https://${{ secrets.SCRAPER_TOKEN }}@github.com/${{ secrets.SCRAPER_REPO }} $REPO_FOLDER

      - name: Run script
        run: |
          cd $REPO_FOLDER
          python $SCRIPT_NAME

      - name: Commit, Rebase, Push
        run: |
          cd $REPO_FOLDER
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          # Detect default branch (main or master)
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')

          # Fetch latest remote commits
          git fetch origin $DEFAULT_BRANCH

          # Rebase local changes on latest remote state
          git rebase origin/$DEFAULT_BRANCH || (echo "Rebase failed" && exit 1)

          # Stage and commit changes only if they exist
          git add $OUTPUT_FILE
          git diff --cached --quiet || git commit -m "Update $OUTPUT_FILE"

          # Retry push if there are concurrent changes (3 attempts)
          n=0
          until [ $n -ge 3 ]
          do
            git push origin HEAD:$DEFAULT_BRANCH && break
            n=$((n+1))
            echo "Push failed due to remote updates, retrying ($n/3)..."
            sleep 5
          done
