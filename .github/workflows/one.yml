name: one
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch_one:
    runs-on: ubuntu-latest

    steps:
      # Checkout this public repo (where outputs will be saved)
      - name: Checkout public repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed for git push

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install dependencies
      - name: Install dependencies
        run: pip install httpx pycryptodome

      # Checkout private repo into a subfolder
      - name: Checkout private repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.SCRAPER_REPO }}
          token: ${{ secrets.SCRAPER_TOKEN }}
          path: one-folder

      # Run the Python script from the private repo
      # Save the output in the public repo
      - name: Run Python script
        run: |
          cd one-folder
          # Example: script outputs to ../one.txt (public repo root)
          python one.py ../one.txt

      # Commit and push changes in the public repo
      - name: Commit and push changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add one.txt
          git diff --staged --quiet || git commit -m "refactor: update one"
          git push
