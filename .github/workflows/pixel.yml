name: pixel
on:
  schedule:
    - cron: "*/30 * * * *" 

  workflow_dispatch:

jobs:
  fetch_data:
    runs-on: ubuntu-latest
    env:
      REPO_FOLDER: pixel-repo          # Local folder name for the cloned repo
      SCRIPT_NAME: pixel.py            # Script to run
      OUTPUT_FILE: pixel.json          # Output file generated by the script
    steps:
      # Checkout public repo (workflow runs here)
      - uses: actions/checkout@v5

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install dependencies
      - name: Install dependencies
        run: pip install httpx pycryptodome beautifulsoup4 curl_cffi pytz

      # Clone the private repo
      - name: Clone repo
        run: |
          git clone https://${{ secrets.SCRAPER_TOKEN }}@github.com/${{ secrets.SCRAPER_REPO }} $REPO_FOLDER

      # Run the Python script
      - name: Run Python script
        run: |
          cd $REPO_FOLDER
          python $SCRIPT_NAME

      # Commit and push output
      - name: Commit and push output
        run: |
          cd $REPO_FOLDER
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          
          git add $OUTPUT_FILE
          
          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "Update $OUTPUT_FILE"
          
          # Push with retry logic (up to 5 attempts)
          for i in {1..5}; do
            if git push; then
              echo "✅ Push succeeded on attempt $i"
              break
            else
              if [ $i -eq 5 ]; then
                echo "❌ Push failed after 5 attempts"
                exit 1
              fi
              echo "⚠️ Push failed, attempt $i/5"
              
              # Random delay between 5-15 seconds
              DELAY=$((5 + RANDOM % 11))
              echo "Waiting ${DELAY} seconds before retry..."
              sleep $DELAY
              
              # Pull and rebase before retry
              echo "Pulling latest changes..."
              git pull --rebase origin main
            fi
          done
