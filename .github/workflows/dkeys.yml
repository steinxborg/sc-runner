class AsyncKeyStorage:
    """Async Redis-based storage for encryption keys."""
    
    def __init__(self, redis_url, redis_prefix='daddylive:keys:', ttl=60*60*24):
        self.redis_url = redis_url
        self.redis_prefix = redis_prefix
        self.ttl = ttl
        self.redis_client = None
        
    async def connect(self):
        """Establish async connection to Redis."""
        try:
            self.redis_client = await aioredis.from_url(
                self.redis_url,
                decode_responses=True,
                socket_connect_timeout=5,
                socket_timeout=15
            )
            await self.redis_client.ping()
            logging.info(f"{Fore.GREEN}✓ Connected to Redis (Async){Style.RESET_ALL}")
            if self.ttl:
                logging.info(f"{Fore.CYAN}Key TTL: {self.ttl} seconds{Style.RESET_ALL}")
        except Exception as e:
            logging.error(f"{Fore.RED}Failed to connect to Redis: {e}{Style.RESET_ALL}")
            raise

    async def close(self):
        """Close Redis connection."""
        if self.redis_client:
            await self.redis_client.aclose()

    def _get_redis_key(self, key_id, number=None):
        """Generate Redis key name."""
        if number:
            return f"{self.redis_prefix}{key_id}:{number}"
        return f"{self.redis_prefix}{key_id}:*"

    async def save_key(self, key_id, number, key_bytes):
        """Save a key to Redis storage asynchronously."""
        base64_key = base64.b64encode(key_bytes).decode('ascii')
        
        try:
            redis_key = self._get_redis_key(key_id, number)
            existing = await self.redis_client.get(redis_key)
            if existing == base64_key:
                logging.info(f"{Fore.BLUE}Key already exists in Redis: {key_id}/{number}{Style.RESET_ALL}")
                return True
            
            await self.redis_client.set(redis_key, base64_key)
            
            if self.ttl:
                await self.redis_client.expire(redis_key, self.ttl)
            
            logging.info(f"{Fore.GREEN}✓ Saved key to Redis: {key_id}/{number}{Style.RESET_ALL}")
            return True
        except Exception as e:
            logging.error(f"{Fore.RED}✗ Error saving to Redis: {e}{Style.RESET_ALL}")
            return False

    async def key_exists(self, key_id, number):
        """Check if a key exists in Redis asynchronously."""
        try:
            redis_key = self._get_redis_key(key_id, number)
            exists = await self.redis_client.exists(redis_key)
            return exists > 0
        except Exception as e:
            logging.error(f"{Fore.RED}Error checking key existence: {e}{Style.RESET_ALL}")
            return False

    async def get_key_count(self, key_id=None):
        """Get count of stored keys asynchronously."""
        try:
            if key_id:
                pattern = f"{self.redis_prefix}{key_id}:*"
            else:
                pattern = f"{self.redis_prefix}*"
            
            count = 0
            async for _ in self.redis_client.scan_iter(match=pattern, count=100):
                count += 1
            return count
        except Exception as e:
            logging.error(f"{Fore.RED}Error counting keys: {e}{Style.RESET_ALL}")
            return 0

    async def get_key(self, key_id, number):
        """Retrieve a key from Redis storage asynchronously."""
        try:
            redis_key = self._get_redis_key(key_id, number)
            base64_key = await self.redis_client.get(redis_key)
            
            if base64_key is None:
                return None
            
            # Decode from base64 to bytes
            key_bytes = base64.b64decode(base64_key)
            return key_bytes
        except Exception as e:
            logging.error(f"{Fore.RED}Error retrieving key from Redis: {e}{Style.RESET_ALL}")
            return None

    async def get_stats(self):
        """Get storage statistics asynchronously."""
        try:
            info = await self.redis_client.info('memory')
            stats = {
                'total_keys': await self.get_key_count(),
                'memory_used': info.get('used_memory_human', 'N/A'),
                'memory_peak': info.get('used_memory_peak_human', 'N/A'),
            }
            return stats
        except Exception as e:
            logging.error(f"{Fore.RED}Error getting stats: {e}{Style.RESET_ALL}")
            return {}


class DaddyLiveKeyFetcher:
    def __init__(self, channel_id, storage=None, timeout=30, use_proxy2=False, max_retries=3):
        self.channel_id = channel_id
        self.timeout = timeout
        self.max_retries = max_retries
        self.domains = ["dlhd.dad"]
        self.storage = storage
        self.use_proxy2 = use_proxy2
        self.session = curl_cffi.requests.Session(impersonate="chrome", timeout=60)
        self.session.verify = False
        self.session.headers.update({"User-Agent": USER_AGENT})
        self.origin = "https://epicplay.cfd"

    def _sync_request_with_retry(self, method, url, description, **kwargs):
        """Helper to retry synchronous curl_cffi requests with backoff."""
        for attempt in range(self.max_retries):
            try:
                response = self.session.request(method, url, **kwargs)
                if response.status_code == 200:
                    return response
                else:
                    logging.warning(f"{Fore.YELLOW}Attempt {attempt+1}/{self.max_retries} - Failed {description}: Status {response.status_code}{Style.RESET_ALL}")
            except Exception as e:
                logging.warning(f"{Fore.YELLOW}Attempt {attempt+1}/{self.max_retries} - Error {description}: {e}{Style.RESET_ALL}")
            
            # Backoff before retrying
            if attempt < self.max_retries - 1:
                wait_time = (attempt + 1) * 2 + random.uniform(0, 1)
                time.sleep(wait_time)
        
        logging.error(f"{Fore.RED}Failed {description} after {self.max_retries} attempts.{Style.RESET_ALL}")
        return None

    def get_stream_url(self):
        """Get the initial stream URL by following the iframe chain."""
        # Step 1: Get the main page
        url = "https://pastebin.com/raw/HqFN0aC0"
        logging.info(f"Fetching main page: {url}")
        
        r = self._sync_request_with_retry(
            "GET", url, "fetching stream list from Pastebin", timeout=self.timeout
        )
        
        if not r:
            return None

        try:
            channels_data = r.json()
            for channel in channels_data:
                if str(self.channel_id) == channel.get("channel_id", ""):
                    stream_url = channel.get("stream_url", "")
                    # origin = channel.get("origin", "") # Not strictly needed if hardcoded
                    return stream_url
        except Exception as e:
            logging.error(f"Error parsing channel data: {e}")
            return None
        
        return None

    async def fetch_key_async(self, client, key_url, key_id, current_number, origin, max_retries=3):
        """Fetch a single encryption key using the proxy API with async retry logic."""
        # Check cache first (NON-BLOCKING)
        if self.storage and await self.storage.key_exists(key_id, str(current_number)):
            logging.info(f"{Fore.BLUE}⚡ Cache hit: {key_id}/{current_number} (skipping fetch){Style.RESET_ALL}")
            return {
                'number': current_number,
                'cached': True
            }
        
        # Retry loop - non-blocking for other tasks
        for attempt in range(1, max_retries + 1):
            try:
                # 1. Prepare Data payload (Headers encoded in Base64)
                headers_raw = f"Origin={self.origin}|Referer={self.origin}/|User-Agent={USER_AGENT}"
                headers_b64 = base64.b64encode(headers_raw.encode('utf-8')).decode('utf-8')
                
                # 2. Prepare URL parameters (URL Encoded)
                encoded_target_url = urllib.parse.quote(key_url)
                encoded_data = urllib.parse.quote(headers_b64)
                
                # 3. Construct Proxy URL
                proxy_api_url = f"http://drewlive2423.duckdns.org:4123?url={encoded_target_url}&data={encoded_data}&key=true"
                
                r_key = await client.get(
                    proxy_api_url,
                    timeout=self.timeout
                )
                
                if r_key.status_code == 200:
                    # The proxy returns the raw key bytes
                    key_base64 = base64.b64encode(r_key.content).decode('ascii')
                    
                    # Save to Redis if storage is available (NON-BLOCKING)
                    if self.storage:
                        await self.storage.save_key(key_id, str(current_number), r_key.content)
                    
                    logging.info(f"{Fore.GREEN}✓ Fetched key {current_number}: {key_base64}{Style.RESET_ALL}")
                    
                    return {
                        'number': current_number,
                        'key': key_base64,
                        'bytes': r_key.content,
                        'cached': False
                    }
                else:
                    logging.warning(f"{Fore.YELLOW}Attempt {attempt}/{max_retries} - Failed to fetch key {current_number}: Status {r_key.status_code}{Style.RESET_ALL}")
                    
            except Exception as e:
                logging.error(f"{Fore.RED}Attempt {attempt}/{max_retries} - Error fetching key {current_number}: {e}{Style.RESET_ALL}")
            
            # If not the last attempt, wait before retrying (non-blocking)
            if attempt < max_retries:
                # Add jitter to avoid thundering herd
                wait_time = (attempt * 2) + random.uniform(0.1, 1.0)
                # logging.info(f"{Fore.CYAN}Key {current_number}: Retrying in {wait_time:.1f}s...{Style.RESET_ALL}")
                await asyncio.sleep(wait_time)
        
        # All retries exhausted
        logging.error(f"{Fore.RED}✗ Failed to fetch key {current_number} after {max_retries} attempts{Style.RESET_ALL}")
        return None

    async def fetch_key_proxy2_async(self, client, key_url, key_id, current_number, origin, max_retries=3):
        """Fetch a single encryption key using the epicplay247 proxy with async retry logic."""
        # Check cache first (NON-BLOCKING)
        if self.storage and await self.storage.key_exists(key_id, str(current_number)):
            logging.info(f"{Fore.BLUE}⚡ Cache hit: {key_id}/{current_number} (skipping fetch){Style.RESET_ALL}")
            return {
                'number': current_number,
                'cached': True
            }
        
        # Retry loop - non-blocking for other tasks
        for attempt in range(1, max_retries + 1):
            try:
                # 1. Encode the key URL in base64
                encoded_key_url = base64.b64encode(key_url.encode('utf-8')).decode('utf-8')
                
                # 2. Prepare headers JSON
                headers_json = {
                    "Referer": f"{origin}/"
                }
                headers_b64 = base64.b64encode(
                    str(headers_json).replace("'", '"').encode('utf-8')
                ).decode('utf-8')
                
                # 3. Construct Proxy2 URL
                proxy_api_url = f"https://epicplay247.cfd/?url={encoded_key_url}&key=true&headers={headers_b64}"
                
                r_key = await client.get(
                    proxy_api_url,
                    timeout=self.timeout
                )
                
                if r_key.status_code == 200:
                    # The proxy returns the raw key bytes
                    key_base64 = base64.b64encode(r_key.content).decode('ascii')
                    
                    # Save to Redis if storage is available (NON-BLOCKING)
                    if self.storage:
                        await self.storage.save_key(key_id, str(current_number), r_key.content)
                    
                    logging.info(f"{Fore.GREEN}✓ [Proxy2] Fetched key {current_number}: {key_base64}{Style.RESET_ALL}")
                    
                    return {
                        'number': current_number,
                        'key': key_base64,
                        'bytes': r_key.content,
                        'cached': False
                    }
                else:
                    logging.warning(f"{Fore.YELLOW}Attempt {attempt}/{max_retries} - [Proxy2] Failed to fetch key {current_number}: Status {r_key.status_code}{Style.RESET_ALL}")
                    
            except Exception as e:
                logging.error(f"{Fore.RED}Attempt {attempt}/{max_retries} - [Proxy2] Error fetching key {current_number}: {e}{Style.RESET_ALL}")
                
            # If not the last attempt, wait before retrying (non-blocking)
            if attempt < max_retries:
                wait_time = (attempt * 2) + random.uniform(0.1, 1.0)
                await asyncio.sleep(wait_time)
        
        # All retries exhausted
        logging.error(f"{Fore.RED}✗ [Proxy2] Failed to fetch key {current_number} after {max_retries} attempts{Style.RESET_ALL}")
        return None

    async def fetch_keys(self, max_keys=5):
        """Fetch encryption keys from the stream asynchronously."""
        # Step 1: Get stream URL (Includes Retries now)
        m3u8_url = self.get_stream_url()
        
        if not m3u8_url:
            logging.error("Failed to fetch m3u8 url")
            return []
        
        # Step 3: Fetch playlist (Added Retries here)
        logging.info(f"Fetching playlist: {m3u8_url}")
        
        r_playlist = self._sync_request_with_retry(
            "GET", 
            m3u8_url, 
            "fetching playlist",
            headers={
                "Referer": self.origin + "/",
                "Origin": self.origin,
                "User-Agent": USER_AGENT
            },
            timeout=self.timeout
        )
        
        if not r_playlist:
            logging.error(f"Failed to fetch playlist after retries.")
            return []
        
        # Step 4: Parse playlist
        try:
            playlist = m3u8.loads(r_playlist.text)
        except Exception as e:
            logging.error(f"Failed to parse m3u8: {e}")
            return []
        
        if not playlist.keys:
            logging.warning("No encryption keys found in playlist")
            return []
        
        try:
            # Step 5: Get key URL
            key_uri = playlist.keys[0].absolute_uri
            logging.info(f"Key URL template: {key_uri}")
        except:
            logging.info("No Key URL found")
            return []
        
        # Extract starting number
        number_match = re.search(r'number=(\d+)', key_uri)
        if not number_match:
            logging.error("Could not extract key number")
            return []
        
        start_number = int(number_match.group(1))
        logging.info(f"Starting number: {start_number}")
        
        # Extract key_id for Redis storage
        key_id_match = re.search(r'name=premium([^&]+)', key_uri)
        if key_id_match:
            key_id = key_id_match.group(1)
        else:
            key_id = str(self.channel_id)
        
        # Check existing cache (NON-BLOCKING)
        if self.storage:
            existing_count = await self.storage.get_key_count(key_id)
            if existing_count > 0:
                logging.info(f"{Fore.BLUE}Found {existing_count} existing keys in cache for {key_id}{Style.RESET_ALL}")
        
        # Step 6: Fetch keys asynchronously using httpx
        logging.info(f"{Fore.CYAN}Starting async fetch of {max_keys} keys...{Style.RESET_ALL}")
        
        # Choose which fetch method to use based on proxy flag
        fetch_method = self.fetch_key_proxy2_async if self.use_proxy2 else self.fetch_key_async
        
        # Create async HTTP client
        async with httpx.AsyncClient(verify=False, limits=httpx.Limits(max_keepalive_connections=100, max_connections=100)) as client:
            tasks = []
            
            for i in range(max_keys):
                current_number = start_number + i
                target_key_url = re.sub(r'number=\d+', f'number={current_number}', key_uri)
                
                # Create async task
                task = fetch_method(
                    client,
                    target_key_url,
                    key_id,
                    current_number,
                    self.origin,
                    max_retries=self.max_retries
                )
                tasks.append(task)
            
            # Wait for all tasks to complete with asyncio.gather
            results = await asyncio.gather(*tasks)
        
        # Filter out None results and separate cached vs fetched
        keys = []
        keys_saved = 0
        keys_cached = 0
        keys_failed = 0
        
        for result in results:
            if result:
                if result.get('cached'):
                    keys_cached += 1
                else:
                    keys.append(result)
                    keys_saved += 1
            else:
                keys_failed += 1
        
        # Display statistics (NON-BLOCKING)
        if self.storage:
            stats = await self.storage.get_stats()
            logging.info(f"\n{Fore.CYAN}{'='*60}")
            logging.info(f"✓ Completed! Channel {self.channel_id}:")
            logging.info(f"  - Newly fetched: {keys_saved}")
            logging.info(f"  - From cache: {keys_cached}")
            logging.info(f"  - Failed: {keys_failed}")
            logging.info(f"  - Total processed: {keys_saved + keys_cached}/{max_keys}")
            logging.info(f"Total keys in Redis: {stats.get('total_keys', 'N/A')}")
            logging.info(f"Memory used: {stats.get('memory_used', 'N/A')}")
            logging.info(f"{'='*60}{Style.RESET_ALL}")
        
        return keys


async def main_async(args):
    """Async main function."""
    logging.info("="*60)
    logging.info(f"DaddyLive Key Fetcher - Channel {args.channel_id}")
    if args.use_proxy2:
        logging.info("Using Proxy2 (epicplay247.cfd)")
    else:
        logging.info("Using Proxy1 (drewlive2423.duckdns.org)")
    logging.info("="*60)
    
    # Initialize Async Redis storage
    storage = None
    try:
        storage = AsyncKeyStorage(
            redis_url=REDIS_URL,
        )
        await storage.connect()
        
        fetcher = DaddyLiveKeyFetcher(
            args.channel_id, 
            storage=storage,
            use_proxy2=args.use_proxy2,
            max_retries=args.max_retries
        )
        keys = await fetcher.fetch_keys(max_keys=args.max_keys)
        
        logging.info("\n" + "="*60)
        logging.info(f"Fetched {len(keys)} keys")
        logging.info("="*60)
        
        if not storage:
            for key_data in keys:
                print(f"Number: {key_data['number']}, Key: {key_data['key']}")
        
        # Close Redis connection
        await storage.close()
                
    except Exception as e:
        logging.error(f"Failed to initialize Redis storage: {e}")
        import traceback
        traceback.print_exc()


def main():
    parser = argparse.ArgumentParser(description="Fetch DaddyLive encryption keys via Proxy")
    parser.add_argument(
        "--channel_id",
        "-c",
        type=int,
        required=True,
        help="Channel ID to fetch keys for"
    )
    parser.add_argument(
        "--max_keys",
        type=int,
        default=5,
        help="Maximum number of keys to fetch (default: 5)"
    )
    parser.add_argument(
        "--use-proxy2",
        action="store_true",
        help="Use epicplay247.cfd proxy instead of drewlive2423.duckdns.org"
    )
    parser.add_argument(
        "--max_retries",
        type=int,
        default=3,
        help="Max retries for network requests (default: 3)"
    )
    
    args = parser.parse_args()
    
    # Run async main
    asyncio.run(main_async(args))


if __name__ == "__main__":
    main()
